# this config is used for testing in test_full_runs.py
scenario = "test myopic"
scenario_mode = "myopic"

# note that myopic currently only supports input = output.  Test code will be responsible
# for making a fresh copy (if desired) and moving it to the output folder
input_database = "tests/testing_outputs/myo_utopia.sqlite"
output_database = "tests/testing_outputs/myo_utopia.sqlite"
neos = false

# solver
solver_name = "cbc"

# generate an excel file in the output_files folder
save_excel = true

# save the duals in the output .sqlite database
save_duals = true

# save a copy of the pyomo-generated lp file to the outputs folder (may be large file!)
save_lp_file = false

# ------------------------------------
#          MODEL PARAMETERS
#  these are specific to each model
# ------------------------------------

# How to sequence time slices in the model. Options:
# 'loop_periods'
# Time slices sequence through seasons and between seasons, looping from the end of each
# period back to its start. Compatible with seasonal time-slicing databases.
# 'loop_seasons'
# Time slices sequence through seasons but loop from the end of each season back to its start.
# Time slices do not connect between seasons. Compatible with representative periods databases.
# 'manual'
# The sequence of time slices is defined manually in the TimeNext table (which is commented out in
# the schema). This is an advanced feature and not recommended for most users.
time_sequencing = 'loop_periods'

# ---------------------------------------------------
#                   MODE OPTIONS
# options below are mode-specific and will be ignored
# if the run is not executed in that mode.
# ---------------------------------------------------
[MGA]
slack = 0.1
iterations = 4
weight = "integer"   # currently supported: [integer, normalized]

[myopic]
view_depth = 2  # number of periods seen/analyzed per iteration
step_size = 1    # number of periods to step by


