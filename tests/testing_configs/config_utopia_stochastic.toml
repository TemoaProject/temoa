# Temoa configuration for utopia stochastic run
scenario = "utopia_stochastic"
scenario_mode = "stochastic"
input_database = "tests/testing_outputs/utopia.sqlite"
output_database = "tests/testing_outputs/utopia_stochastic.sqlite"
output_path = "tests/testing_outputs/utopia_stochastic"
solver_name = "appsi_highs"
time_sequencing = "seasonal_timeslices"
save_duals = false

[stochastic]
stochastic_config = "../testing_data/utopia_stochastic_config.toml"
