name: CI

on:
  push:
    branches:
      [
        "main",
        "temoa_alpha",
        "ci_testing",
        "1.0.0-dev-operator",
        "temoa_davey_code",
      ]
  pull_request:
    branches:
      [
        "main",
        "temoa_alpha",
        "ci_testing",
        "1.0.0-dev-operator",
        "temoa_davey_code",
      ]

jobs:
  test:
    name: setup and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.6"
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Install CBC solver
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-cbc

      - name: Run tests
        env:
          CI: 1
        run: uv run pytest tests

  type-check:
    name: type check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.6"
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run mypy
        run: uv run mypy --config-file=pyproject.toml temoa/
